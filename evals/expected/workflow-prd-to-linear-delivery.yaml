case: workflow-prd-to-linear-delivery
skill_ids:
  - workflow-prd-to-linear-delivery
  - pm-docs
  - pm-delivery
  - pm-tooling
rubrics:
  - delivery_readiness
  - tooling_safety
expected_sections:
  - prd_readiness_review
  - scope_map
  - epic_map
  - story_set
  - acceptance_criteria
  - dependencies
  - linear_dry_run_payloads
  - approval_gates
  - open_questions
  - next_actions
must_include:
  - PRD completeness review
  - non-goals preserved in delivery handoff
  - edge cases and failure states
  - update preview for existing external IDs
  - explicit Linear confirmation question
must_not_include:
  - implementation-only tasks without user value
  - live Linear write without confirmation
  - duplicate issue creation when external ID mapping exists

required_json_payloads:
  - linear_issue_batch

provenance_required: false
